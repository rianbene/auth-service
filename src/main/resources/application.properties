# nome da aplicação e porta do servidor
spring.application.name=auth-service
server.port=8081
# configurações do postgree
spring.datasource.url=jdbc:postgresql://localhost:5434/clinica_auth_db
spring.datasource.username=auth_user
spring.datasource.password=auth_password
spring.datasource.driver-class-name=org.postgresql.Driver
# Configuração do Hibernate (JPA)
# 'update': Atualiza o schema do banco se a Entidade Java mudar. Recomendado apenas para DEV.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# propriedade customizada do JWT 
api.security.token.secret=chaveSecretaJWT
api.security.token.expiration=3600000

